<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Publish New Poem</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    color:#8b0000;
}

label{
    display:block;
    margin-top:15px;
    font-size:18px;
}

input, textarea{
    width:90%;
    padding:10px;
    margin-top:8px;
    font-size:16px;
}

button{
    margin-top:20px;
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>🌹 Publish New Poem 🌹</h1>

<label>Poem Title</label>
<input type="text" id="title" placeholder="Enter title">

<label>Your Poem</label>
<textarea id="poem" rows="12" placeholder="Paste your poem here"></textarea>

<br>

<button id="publishBtn">Publish</button>

</div>

<script>
document.getElementById("publishBtn").addEventListener("click", function () {

    let title = document.getElementById("title").value.trim();
    let poem = document.getElementById("poem").value.trim();

    if (title === "" || poem === "") {
        alert("Please enter both title and poem.");
        return;
    }

    let poems = JSON.parse(localStorage.getItem("poems")) || [];

    poems.push({
        title: title,
        poem: poem
    });

    localStorage.setItem("poems", JSON.stringify(poems));

    alert("Poem published successfully!");

    document.getElementById("title").value = "";
    document.getElementById("poem").value = "";
});
</script>

</body>
</html>
