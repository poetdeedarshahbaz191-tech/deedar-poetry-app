<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publish New Poem</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
input,textarea{
    width:90%;
    padding:10px;
    margin:10px 0;
    font-size:16px;
}
button{
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
}
#message{
    color:green;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<h1>🌹 Publish New Poem 🌹</h1>

<input type="text" id="title" placeholder="Poem Title">

<textarea id="poem" rows="12" placeholder="Write your poem here"></textarea>

<br>

<button onclick="publishPoem()">Publish</button>

<p id="message"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEtsOoIe3tll0_hvovC42j9ujcb8Wavu4",
  authDomain: "poet--deedar---shahbaz.firebaseapp.com",
  projectId: "poet--deedar---shahbaz",
  storageBucket: "poet--deedar---shahbaz.firebasestorage.app",
  messagingSenderId: "411582745091",
  appId: "1:411582745091:web:96413eef58092e77911c36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.publishPoem = async function () {

const title=document.getElementById("title").value;
const poem=document.getElementById("poem").value;

if(title===""||poem===""){
alert("Please enter title and poem.");
return;
}

try{

await addDoc(collection(db,"poems"),{
title:title,
poem:poem,
date:new Date()
});

document.getElementById("message").innerHTML="✅ Poem published successfully!";

document.getElementById("title").value="";
document.getElementById("poem").value="";

}catch(e){

alert("Error: "+e.message);

}

}

</script>

</body>
</html>
